<!doctype html>
<meta charset="UTF-8" />
<html lang="de">
    <head>
        <link rel="stylesheet" href="style.css" />
        <title>Mein Bookstore</title>

        <link
            rel="icon"
            type="image/x-icon"
            href="./assets/icons/book_icon.png"
        />
    </head>
    <body>
        <header>
            <h1>Bookstore</h1>
        </header>
        <div class="filter-controls">
            <button id="show-all-btn">Alle anzeigen</button>
            <button id="show-favs-btn">Nur Favoriten</button>
        </div>
        <main id="book-container"></main>

        <div id="confirm-modal" class="modal" style="display: none">
            <div class="modal-content">
                <p>Möchtest du den Kommentar wirklich löschen?</p>
                <button id="confirm-yes">Ja</button>
                <button id="confirm-no">Abbrechen</button>
            </div>
        </div>

        <footer>
            <p>
                © 2026 Marcel Schmitz |
                <a
                    href="https://github.com/marcel-schmitz-dev"
                    target="_blank"
                    style="color: #60a5fa; text-decoration: none"
                    >GitHub-Profil</a
                >
            </p>
        </footer>
        <script type="module" src="script.js"></script>
    </body>
</html>
